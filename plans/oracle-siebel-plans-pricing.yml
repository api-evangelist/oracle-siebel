specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Oracle Siebel
providerId: oracle-siebel
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - CRM
  - Customer Management
  - Enterprise Software
  - Oracle Cloud
  - Sales Automation
description: >-
  Oracle Siebel CRM is a long-standing enterprise CRM product, primarily
  deployed on-premises (or on customer-managed OCI compute) and licensed
  per Application User, per Component User, or per Processor on the Oracle
  Applications and Technology Global Price List, with separately purchased
  annual support and update licenses. Siebel CRM on Demand is no longer
  generally available as a SaaS offering for new customers; existing Siebel
  customers continue under their negotiated agreements. There is no free or
  per-API public tier; the Siebel REST API, SOAP web services, EAI, business
  service, object interfaces, Open UI JavaScript API, and event pub/sub
  surface are all included with any active Siebel license. Engage Oracle
  Sales for the per-user / per-processor rate.
sources:
  - https://www.oracle.com/cx/siebel/
  - https://docs.oracle.com/cd/F26413_01/
  - https://www.oracle.com/applications/customer-experience/contact/
notes: >-
  Oracle blocks programmatic fetches of www.oracle.com pricing pages (HTTP 403).
  Plan structure preserved as a per-user / per-processor on-premises plan
  plus an enterprise tier; replace per-user / per-processor list price with
  the verified Oracle Applications Global Price List value when available.
plans:
  - id: oracle-siebel-application-user
    name: Siebel Application User License
    type: subscription
    description: >-
      Siebel CRM licensed per Application User on the Oracle Applications
      Global Price List, with separately purchased annual support and
      update license. Includes the full Siebel API surface (REST, SOAP,
      EAI, Business Services, Object Interfaces, Open UI, Event Pub/Sub).
    entries:
      - label: Application User
        name: application_user
        type: subscription
        metric: user
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
      - label: Component User
        name: component_user
        type: subscription
        metric: user
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
      - label: Annual Support and Update License
        name: support_update
        type: subscription
        metric: percent_of_license
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Oracle Siebel REST API
      - name: Oracle Siebel SOAP Web Services
      - name: Oracle Siebel Business Service API
      - name: Oracle Siebel EAI (Enterprise Application Integration)
      - name: Oracle Siebel Object Interfaces API
      - name: Oracle Siebel Open UI JavaScript API
      - name: Oracle Siebel Event Pub/Sub API
  - id: oracle-siebel-per-processor
    name: Siebel Per-Processor License
    type: subscription
    description: >-
      Siebel CRM licensed per processor on the Oracle Applications Global
      Price List, typically for self-service or unconstrained user-base
      deployments. Includes the full Siebel API surface.
    entries:
      - label: Per-Processor License
        name: per_processor_license
        type: subscription
        metric: processor
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Oracle Siebel REST API
      - name: Oracle Siebel SOAP Web Services
      - name: Oracle Siebel Business Service API
      - name: Oracle Siebel EAI (Enterprise Application Integration)
      - name: Oracle Siebel Object Interfaces API
      - name: Oracle Siebel Open UI JavaScript API
      - name: Oracle Siebel Event Pub/Sub API
  - id: oracle-siebel-enterprise
    name: Enterprise Agreement
    type: enterprise
    description: >-
      Negotiated enterprise agreement covering Siebel CRM plus adjacent
      Oracle Applications (Database, Fusion Middleware, Analytics) under a
      single contract. Includes premier support, contractual SLAs, and named
      technical account management.
    entries:
      - label: Negotiated User / Processor Volume
        name: negotiated_volume
        type: subscription
        metric: bundle
        limit: -1
        timeFrame: year
        geo: configurable
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Oracle Siebel REST API
      - name: Oracle Siebel SOAP Web Services
      - name: Oracle Siebel Business Service API
      - name: Oracle Siebel EAI (Enterprise Application Integration)
      - name: Oracle Siebel Object Interfaces API
      - name: Oracle Siebel Open UI JavaScript API
      - name: Oracle Siebel Event Pub/Sub API
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
