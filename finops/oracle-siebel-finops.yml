specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Oracle Siebel
providerId: oracle-siebel
publisherName: Oracle America, Inc.
serviceCategory: CRM
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - CRM
  - Enterprise Software
  - Oracle Cloud
  - FinOps
  - FOCUS
description: >-
  FOCUS-aligned FinOps view for Oracle Siebel CRM: contractual Oracle
  Applications licenses (per Application User, Component User, or Processor)
  plus the underlying infrastructure cost (on-premises hardware or OCI
  compute, block storage, and networking) used to host the Siebel
  Application Object Manager, Application Server, Web Server, and Database.
  REST, SOAP, EAI, and Object Interface APIs are bundled with the license.
sources:
  - https://www.oracle.com/cx/siebel/
  - https://docs.oracle.com/cd/F26413_01/
notes: >-
  No per-API meter exists. Track contractual license counts per metric and
  the underlying compute / storage cost for the Siebel deployment; reconcile
  annually against the Oracle support and update license invoice.
billingModel:
  pricingCategory: Per-User / Per-Processor License (BYOL)
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Oracle Siebel CRM
  ServiceCategory: CRM
  ProviderName: Oracle
  PublisherName: Oracle America, Inc.
  InvoiceIssuerName: Oracle America, Inc.
  BillingCurrency: USD
  PricingCategory: License + Support
  ChargeCategory: Purchase
meters:
  - name: siebel_application_user_license
    description: Active Application User licenses contracted with Oracle
    unit: user
    aggregation: max
    dimensions:
      - business_unit
  - name: siebel_component_user_license
    description: Active Component User licenses contracted with Oracle
    unit: user
    aggregation: max
    dimensions:
      - component
      - business_unit
  - name: siebel_per_processor_license
    description: Per-processor licenses contracted with Oracle
    unit: processor
    aggregation: max
    dimensions:
      - environment
  - name: support_and_update_license
    description: Annual support and update license fee (typically a percentage of contract value)
    unit: usd-annual
    aggregation: sum
  - name: hosting_compute
    description: Underlying infrastructure compute cost (on-premises or OCI) for the Siebel deployment
    unit: ocpu-hour
    aggregation: sum
    dimensions:
      - environment
      - region
principles:
  - name: Visibility
    description: >-
      Maintain a contract-level inventory of Siebel license counts per
      metric, plus an infrastructure inventory of the AOM, Application
      Server, Web Server, and Database tiers; reconcile each annually.
  - name: Allocation
    description: >-
      Tag each Siebel environment (development, test, production, DR) and
      allocate license + infrastructure cost to the consuming sales,
      marketing, or service organization.
  - name: Optimization
    description: >-
      Reclaim inactive Application User accounts, retire unused Siebel
      modules to reduce support fees, and right-size the AOM, Application
      Server, and Database tiers when migrating to OCI compute.
  - name: Accountability
    description: >-
      Pair the Siebel applications administrator with the customer-experience
      finance partner; review license utilization annually before the
      support and update renewal.
apis:
  - name: Oracle Siebel REST API
    serviceName: Oracle Siebel REST API
    serviceCategory: CRM
  - name: Oracle Siebel SOAP Web Services
    serviceName: Oracle Siebel SOAP Web Services
    serviceCategory: CRM
  - name: Oracle Siebel Business Service API
    serviceName: Oracle Siebel Business Service API
    serviceCategory: CRM
  - name: Oracle Siebel EAI (Enterprise Application Integration)
    serviceName: Oracle Siebel EAI (Enterprise Application Integration)
    serviceCategory: CRM
  - name: Oracle Siebel Object Interfaces API
    serviceName: Oracle Siebel Object Interfaces API
    serviceCategory: CRM
  - name: Oracle Siebel Open UI JavaScript API
    serviceName: Oracle Siebel Open UI JavaScript API
    serviceCategory: CRM
  - name: Oracle Siebel Event Pub/Sub API
    serviceName: Oracle Siebel Event Pub/Sub API
    serviceCategory: CRM
