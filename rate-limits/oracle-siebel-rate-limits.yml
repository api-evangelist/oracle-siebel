specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Oracle Siebel
providerId: oracle-siebel
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - CRM
  - Enterprise Software
  - Oracle Cloud
  - Rate Limiting
description: >-
  Oracle Siebel CRM is a customer-deployed application; its REST, SOAP, EAI,
  and Object Interface APIs do not enforce a centrally-published per-second
  or per-minute rate-limit table. Throughput is bound by the customer-deployed
  Siebel Application Object Manager (AOM), Application Server, Web Server,
  and Database tier capacity. Rate limiting, when enforced, is implemented at
  the surrounding application server (Oracle WebLogic / IIS / Apache) or via
  a customer-fronted API gateway.
sources:
  - https://docs.oracle.com/cd/F26413_01/
  - https://docs.oracle.com/cd/F26413_01/books/SystemAdmin/
notes: >-
  No public per-tier RPS/RPM numbers are published. Siebel deployments are
  capacity-planned per AOM, Application Server, and Database tier; set
  reconciled to true after capturing deployment-specific tuning values.
responseCodes:
  unauthorized: 401
  forbidden: 403
  notFound: 404
  serverError: 500
  serviceUnavailable: 503
limits:
  - name: REST API Throughput
    scope: deployment
    metric: varies
    limit: bound by Siebel AOM / Application Server capacity
    notes: >-
      Throughput is governed by the deployed Siebel Application Object
      Manager and Application Server sizing rather than a public per-tenancy
      rate.
  - name: SOAP Web Services Throughput
    scope: deployment
    metric: varies
    limit: bound by Siebel AOM / Application Server capacity
    notes: >-
      As with REST, SOAP web service throughput is bound by the deployed
      Siebel server tier.
  - name: EAI Inbound / Outbound Throughput
    scope: deployment
    metric: varies
    limit: bound by deployed EAI configuration
    notes: >-
      EAI throughput depends on the configured business-service component
      pools and underlying transport (HTTP, JMS, MQ).
policies:
  - name: Capacity-Bound Throttling
    description: >-
      Throughput limits are determined by the deployed Siebel Application
      Object Manager, Application Server, Web Server, and Database tier
      sizing rather than a published per-tenancy rate-limit table.
  - name: Backoff Strategy
    description: >-
      Clients should implement exponential backoff with jitter on 5xx
      responses; honor any Retry-After header when present.
  - name: AOM Tuning
    description: >-
      Siebel administrators should tune AOM component thread pools,
      MaxTasks, and MaxMTServers settings to match observed load rather
      than relying on a centrally-imposed rate.
  - name: API Gateway Pattern
    description: >-
      Customers exposing Siebel APIs to third parties should front them
      with an API gateway (Oracle API Platform, Apigee, etc.) and apply
      rate limits there.
maintainers:
