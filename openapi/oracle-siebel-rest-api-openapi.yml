            $ref: '#/components/schemas/LinkObject'
    BusinessServiceRequest:
      type: object
      description: >-
        Request payload for invoking a Siebel business service method.
        Contains optional body with SiebelMessage integration object
        format for structured data operations.
      properties:
        body:
          type: object
          description: >-
            Wrapper containing the SiebelMessage integration object
          properties:
            SiebelMessage:
              type: object
              description: >-
                Siebel integration object message containing the data
                payload for the business service operation
              properties:
                MessageId:
                  type: string
                  description: Optional message identifier
                MessageType:
                  type: string
                  description: Message type identifier
                  default: Integration Object
                IntObjectName:
                  type: string
                  description: >-
                    Name of the integration object (e.g., Account Interface)
                IntObjectFormat:
                  type: string
                  description: Format of the integration object
                  default: Siebel Hierarchical
    BusinessServiceResponse:
      type: object
      description: >-
        Response payload from a Siebel business service method invocation.
        Contains the output data from the executed business service method.
    LinkObject:
      type: object
      description: >-
        HATEOAS link object providing navigation references to related
        Siebel REST API resources
      properties:
        rel:
          type: string
          description: >-
            Relationship type (self, child, parent)
          enum:
            - self
            - child
            - parent
        href:
          type: string
          format: uri
          description: >-
            Full URL to the related resource
        name:
          type: string
          description: >-
            Name of the related business component
