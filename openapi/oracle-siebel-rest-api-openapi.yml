  /service/{ServiceName}/{MethodName}:
    post:
      operationId: invokeBusinessService
      summary: Invoke a business service method
      description: >-
        Execute a method on a named Siebel business service. The service
        name and method name are specified in the URL path. The request
        body contains the input parameters as a Siebel property set or
        integration object message. Business services must be explicitly
        configured for REST access and associated with a responsibility
        to control access.
      tags:
        - Business Services
      parameters:
        - name: ServiceName
          in: path
          required: true
          description: >-
            Name of the Siebel business service to invoke
          schema:
            type: string
            examples:
              - Siebel Account
        - name: MethodName
          in: path
          required: true
          description: >-
            Name of the method to execute on the business service
          schema:
            type: string
            examples:
              - Insert
              - QueryById
              - QueryByExample
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BusinessServiceRequest'
      responses:
        '200':
          description: Business service method executed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessServiceResponse'
        '400':
          description: Invalid request or method parameters
        '401':
          description: Authentication credentials missing or invalid
        '500':
          description: Business service execution error
  /service/describe:
    get:
      operationId: describeBusinessServices
      summary: Get business service catalog
      description: >-
        Retrieve a catalog of all Siebel business service names, methods
        defined for each service, and links to individual service
        descriptions. Returns an OpenAPI-compatible specification.
      tags:
        - Business Services
        - Metadata
      responses:
        '200':
          description: Business service catalog retrieved successfully
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Authentication credentials missing or invalid
  /service/{ServiceName}/describe:
    get:
      operationId: describeBusinessService
      summary: Describe a business service
      description: >-
        Retrieve the metadata description for a specific business service
        including its methods, input and output arguments, and data types.
      tags:
        - Business Services
        - Metadata
      parameters:
        - name: ServiceName
          in: path
          required: true
          description: >-
            Name of the Siebel business service to describe
          schema:
            type: string
      responses:
        '200':
          description: Business service description retrieved successfully
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Authentication credentials missing or invalid
        '404':
          description: Business service not found
  /workspace/{WorkspaceName}/describe:
    get:
      operationId: describeWorkspace
      summary: Describe workspace repository objects
      description: >-
        Retrieve a catalog of all repository objects available in the
        specified workspace. Returns an OpenAPI-compatible specification
        listing available applets, views, business components, and other
        Siebel repository metadata.
      tags:
        - Repository
        - Metadata
      parameters:
        - $ref: '#/components/parameters/WorkspaceName'
      responses:
        '200':
          description: Workspace description retrieved successfully
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Authentication credentials missing or invalid
  /workspace/{WorkspaceName}/{RepositoryObject}/{ObjectName}:
    get:
      operationId: getRepositoryObject
      summary: Get a repository object
      description: >-
        Retrieve the definition of a specific repository object within
        a workspace. Returns the object properties including child
        objects such as controls, columns, and list items for applets.
      tags:
        - Repository
      parameters:
        - $ref: '#/components/parameters/WorkspaceName'
        - name: RepositoryObject
          in: path
          required: true
          description: >-
            Type of repository object (e.g., Applet, View,
            Business Component)
          schema:
            type: string
        - name: ObjectName
          in: path
          required: true
          description: >-
            Name of the specific repository object
          schema:
            type: string
      responses:
        '200':
          description: Repository object retrieved successfully
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Authentication credentials missing or invalid
        '404':
          description: Repository object not found
  /data/{BusinessObject}/{BusinessComponent}/describe:
    get:
      operationId: describeBusinessComponent
      summary: Describe a business component
      description: >-
        Retrieve the OpenAPI-compatible metadata description for a specific
        business component within a business object. Returns field names,
        data types, picklist values, and available operations.
      tags:
        - Metadata
      parameters:
        - name: BusinessObject
          in: path
          required: true
          description: >-
            Name of the Siebel business object
          schema:
            type: string
        - name: BusinessComponent
          in: path
          required: true
          description: >-
            Name of the Siebel business component
          schema:
            type: string
      responses:
        '200':
          description: Business component description retrieved successfully
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Authentication credentials missing or invalid
        '404':
          description: Business object or component not found
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: >-
        HTTP Basic Authentication using Siebel CRM user credentials
        encoded as Base64 in the Authorization header
    oauth2:
      type: oauth2
      description: >-
        OAuth 2.0 authentication for token-based access to the Siebel
        REST API
      flows:
        authorizationCode:
          authorizationUrl: https://{siebel-server}/siebel/v1.0/auth/authorize
          tokenUrl: https://{siebel-server}/siebel/v1.0/auth/token
          scopes: {}
  parameters:
    AccountId:
      name: AccountId
      in: path
      required: true
      description: >-
        Unique row identifier for the Account record
      schema:
        type: string
        examples:
          - 88-26CND
    ContactId:
      name: ContactId
      in: path
      required: true
      description: >-
        Unique row identifier for the Contact record
      schema:
        type: string
        examples:
          - 0CR-1MF5Z6
    OpportunityId:
      name: OpportunityId
      in: path
      required: true
      description: >-
        Unique row identifier for the Opportunity record
      schema:
        type: string
    ServiceRequestId:
      name: ServiceRequestId
      in: path
      required: true
      description: >-
        Unique row identifier for the Service Request record
      schema:
        type: string
    ActivityId:
      name: ActivityId
      in: path
      required: true
      description: >-
        Unique row identifier for the Activity record
      schema:
        type: string
    WorkspaceName:
      name: WorkspaceName
      in: path
      required: true
      description: >-
        Name of the Siebel workspace (use 'main' for the default workspace)
      schema:
        type: string
        default: main
    fields:
      name: fields
      in: query
      required: false
      description: >-
        Comma-separated list of field names to include in the response.
        When specified, only the listed fields are returned instead of
        all available fields.
      schema:
        type: string
        examples:
          - Name,Location,Account Status
    searchspec:
      name: searchspec
      in: query
      required: false
      description: >-
        Siebel search specification expression for filtering records.
        Uses Siebel query language syntax with field names in square
        brackets and standard comparison operators.
      schema:
        type: string
        examples:
          - '[Name] LIKE ''B*'' AND [Status] = ''Active'''
    ChildLinks:
      name: ChildLinks
      in: query
      required: false
      description: >-
        Comma-separated list of child business component names to include
        as link references in the response. Use 'None' to suppress all
        child links.
      schema:
        type: string
        examples:
          - Contact,Opportunity
          - None
    uniformresponse:
      name: uniformresponse
      in: query
      required: false
      description: >-
        When set to 'yes' or 'y', forces the response to always use the
        JSON array format with an items wrapper, regardless of whether
        the result contains a single record or multiple records.
      schema:
        type: string
        enum:
          - 'yes'
          - 'no'
          - 'y'
          - 'n'
    ViewMode:
      name: ViewMode
      in: query
      required: false
      description: >-
        Access control mode that determines which records are visible.
        Personal returns records owned by the user, Sales Rep uses
        position-based access, and Organization uses organization-level
        visibility rules.
      schema:
        type: string
        enum:
          - Personal
          - Sales Rep
          - Organization
    PageSize:
      name: PageSize
      in: query
      required: false
      description: >-
        Maximum number of records to return in the response. Controls
        pagination by limiting the result set size.
      schema:
        type: integer
        minimum: 1
        examples:
          - 20
    StartRowNum:
      name: StartRowNum
      in: query
      required: false
      description: >-
        Zero-based index of the first record to return. Used in
        combination with PageSize for pagination through large result
        sets.
      schema:
        type: integer
        minimum: 0
        default: 0
  schemas:
    Account:
      type: object
      description: >-
        A Siebel CRM Account business component record representing a
        customer, prospect, or partner organization
      properties:
        Id:
          type: string
          description: Unique row identifier for the account record
        Name:
          type: string
          description: Account name
        Location:
          type: string
          description: Account location identifier
        Account Status:
          type: string
          description: Current status of the account
        Account Type:
          type: string
          description: Type classification of the account
        Description:
          type: string
          description: Detailed description of the account
        Industry:
          type: string
          description: Industry classification
        Primary Organization:
          type: string
          description: Primary organization associated with the account
        Primary Organization Id:
          type: string
          description: Row identifier of the primary organization
        Main Phone Number:
          type: string
          description: Primary phone number for the account
        Main Fax Number:
          type: string
          description: Primary fax number for the account
        Email Address:
          type: string
          description: Primary email address for the account
        Home Page:
          type: string
          description: Website URL for the account
        Current Volume:
          type: number
          description: Current business volume
        Alias:
          type: string
          description: Alternate name or alias for the account
        Link:
          type: array
          description: HATEOAS links to related resources
          items:
            $ref: '#/components/schemas/LinkObject'
    AccountInput:
      type: object
      description: >-
        Input payload for creating or updating an Account record
      required:
        - Name
      properties:
        Name:
          type: string
          description: Account name
        Location:
          type: string
          description: Account location identifier
        Description:
          type: string
          description: Detailed description of the account
        Account Status:
          type: string
          description: Current status of the account
        Account Type:
          type: string
          description: Type classification of the account
        Industry:
          type: string
          description: Industry classification
        Primary Organization:
          type: string
          description: Primary organization name
        Primary Organization Id:
          type: string
          description: Row identifier of the primary organization
        Main Phone Number:
          type: string
          description: Primary phone number
        Email Address:
          type: string
          description: Primary email address
        Home Page:
          type: string
          description: Website URL
    Contact:
      type: object
      description: >-
        A Siebel CRM Contact business component record representing an
        individual person associated with an account
      properties:
        Id:
          type: string
