          type: string
          description: Activity type (e.g., Task, Appointment, Call)
        Description:
          type: string
          description: Activity description
        Status:
          type: string
          description: Current status
        Priority:
          type: string
          description: Priority level
        Due:
          type: string
          description: Due date
        Planned:
          type: string
          description: Planned date and time
        Account:
          type: string
          description: Associated account name
    Product:
      type: object
      description: >-
        A Siebel CRM Product business component record representing an
        item in the product catalog
      properties:
        Id:
          type: string
          description: Unique row identifier for the product record
        Name:
          type: string
          description: Product name
